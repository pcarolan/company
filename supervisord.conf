[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

[program:backend]
command=sh -c "cd /app/backend && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; Frontend is served as static files by the backend in production.
; No separate frontend process needed — it's baked into /app/frontend/dist
; and served by FastAPI.
;
; For development, run with: docker run company frontend-dev
