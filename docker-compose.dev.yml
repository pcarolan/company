version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["backend"]
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./plan.md:/app/plan.md
      - ./program.md:/app/program.md
      - ./project.yaml:/app/project.yaml
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_ORG=${GITHUB_ORG:-}
    # uvicorn --reload watches for file changes
    entrypoint: ["sh", "-c", "cd /app/backend && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"]

  frontend:
    image: node:20-slim
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    command: ["sh", "-c", "npm install && npx vite --host 0.0.0.0 --port 3000"]
